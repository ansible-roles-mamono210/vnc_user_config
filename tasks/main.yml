---
- name: Validate vnc_password is provided (do not bake into image)
  ansible.builtin.assert:
    that:
      - vnc_password is defined
      - (vnc_password | string | length) > 0
    fail_msg: "vnc_password is required. Provide it via Vault or runtime vars."
  no_log: true

- name: Derive display number and TCP port
  ansible.builtin.set_fact:
    vnc_display_num: "{{ vnc_display | regex_replace('^:', '') | int }}"
    vnc_tcp_port: "{{ 5900 + (vnc_display | regex_replace('^:', '') | int) }}"

- name: Ensure VNC user exists (optional)
  ansible.builtin.user:
    name: "{{ vnc_user }}"
    state: present
    create_home: true
  when: vnc_manage_user | bool

- name: Ensure ~/.vnc directory exists
  ansible.builtin.file:
    path: "/home/{{ vnc_user }}/.vnc"
    state: directory
    owner: "{{ vnc_user }}"
    group: "{{ vnc_user }}"
    mode: "0700"

- name: Create ~/.vnc/config
  ansible.builtin.copy:
    dest: "/home/{{ vnc_user }}/.vnc/config"
    owner: "{{ vnc_user }}"
    group: "{{ vnc_user }}"
    mode: "0600"
    content: |
      geometry={{ vnc_geometry }}
      depth={{ vnc_depth }}
      # 必要なら localhost 限定（SSHトンネル前提）にする:
      # localhost

- name: Create ~/.vnc/xstartup (launch desktop session)
  ansible.builtin.copy:
    dest: "/home/{{ vnc_user }}/.vnc/xstartup"
    owner: "{{ vnc_user }}"
    group: "{{ vnc_user }}"
    mode: "0755"
    content: |
      #!/bin/sh
      unset SESSION_MANAGER
      unset DBUS_SESSION_BUS_ADDRESS
      exec {{ vnc_session_command }}

- name: Create VNC password file (binary-safe)
  become: true
  become_user: "{{ vnc_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    mkdir -p "$HOME/.vnc"
    tmp="$(mktemp)"
    trap 'rm -f "$tmp"' EXIT

    printf '%s\n%s\n' "{{ vnc_password }}" "{{ vnc_password }}" | /usr/bin/vncpasswd -f > "$tmp"

    if [ -f "$HOME/.vnc/passwd" ] && cmp -s "$tmp" "$HOME/.vnc/passwd"; then
      exit 0
    fi

    mv -f "$tmp" "$HOME/.vnc/passwd"
    echo "CHANGED"
  args:
    executable: /bin/bash
  register: vnc_passwd_cmd
  changed_when: "'CHANGED' in vnc_passwd_cmd.stdout"
  no_log: true

- name: Map display to user in /etc/tigervnc/vncserver.users
  ansible.builtin.copy:
    dest: /etc/tigervnc/vncserver.users
    owner: root
    group: root
    mode: "0644"
    content: |
      {{ vnc_display }}={{ vnc_user }}

- name: Enable and start VNC service (systemd)
  ansible.builtin.systemd:
    name: "vncserver@{{ vnc_display }}.service"
    enabled: true
    state: started
  when: vnc_manage_service | bool
